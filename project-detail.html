<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title id="page-title">项目详情 | Fred Fu</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <style>
        :root {
            --bg: #f9f9f9;
            --bg-card: #ffffff;
            --bg-nav: rgba(255,255,255,0.8);
            --border: #e5e7eb;
            --text-primary: #1a1a1a;
            --text-secondary: #6b7280;
            --text-muted: #9ca3af;
            --text-nav: #666;
            --text-nav-hover: #1a1a1a;
            --accent: #3b82f6;
            --accent-soft: rgba(59, 130, 246, 0.06);
        }
        .dark {
            --bg: #0f0f13;
            --bg-card: #1a1a22;
            --bg-nav: rgba(15,15,19,0.85);
            --border: #2a2a35;
            --text-primary: #e8e8ed;
            --text-secondary: #9ca3af;
            --text-muted: #6b7280;
            --text-nav: #888;
            --text-nav-hover: #e8e8ed;
            --accent: #60a5fa;
            --accent-soft: rgba(96, 165, 250, 0.08);
        }
        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: var(--bg);
            color: var(--text-primary);
            transition: background-color 0.4s ease, color 0.4s ease;
        }
        #bg-grid {
            position: fixed; inset: 0; z-index: 0; pointer-events: none;
            background-image: linear-gradient(var(--border) 1px, transparent 1px), linear-gradient(90deg, var(--border) 1px, transparent 1px);
            background-size: 60px 60px; opacity: 0.35; transition: opacity 0.4s ease;
        }
        .dark #bg-grid { opacity: 0.18; }
        #particles-canvas { position: fixed; inset: 0; z-index: 1; pointer-events: none; }
        section, footer, nav { position: relative; z-index: 2; }

        /* ── Always show scrollbar to prevent nav jumping ── */
        html { overflow-y: scroll; }

        nav { background-color: var(--bg-nav) !important; border-color: var(--border) !important; backdrop-filter: blur(12px); transition: background-color 0.4s ease, border-color 0.4s ease; }
        .nav-link { position: relative; color: var(--text-nav); transition: color 0.2s ease; }
        .nav-link:hover { color: var(--text-nav-hover); }

        #theme-toggle, #theme-toggle-mobile {
            background: none; border: none; cursor: pointer; padding: 6px; border-radius: 999px;
            color: var(--text-nav); transition: color 0.2s ease, background 0.2s ease;
            display: flex; align-items: center; justify-content: center;
        }
        #theme-toggle:hover, #theme-toggle-mobile:hover { color: var(--text-nav-hover); background: rgba(128,128,128,0.1); }
        #theme-toggle .sun-icon, #theme-toggle-mobile .sun-icon { display: block; }
        #theme-toggle .moon-icon, #theme-toggle-mobile .moon-icon { display: none; }
        .dark #theme-toggle .sun-icon, .dark #theme-toggle-mobile .sun-icon { display: none; }
        .dark #theme-toggle .moon-icon, .dark #theme-toggle-mobile .moon-icon { display: block; }

        footer { background-color: var(--bg-card) !important; border-color: var(--border) !important; }
        .text-gray-400 { color: var(--text-muted) !important; }
        .text-gray-500 { color: var(--text-secondary) !important; }
        .text-gray-600 { color: var(--text-secondary) !important; }
        .text-gray-900 { color: var(--text-primary) !important; }
        .border-gray-100 { border-color: var(--border) !important; }
        .border-gray-200 { border-color: var(--border) !important; }
        .hover\:bg-gray-50:hover { background-color: color-mix(in srgb, var(--bg-card) 95%, transparent) !important; }

        /* ── Footer Link Hover Effect ── */
        .footer-link {
            color: var(--text-muted) !important;
            transition: color 0.3s ease;
            cursor: pointer;
        }
        .footer-link:hover {
            color: #3b82f6 !important;
        }
        .dark .footer-link:hover {
            color: #60a5fa !important;
        }

        /* ── Project Hero ── */
        .project-hero {
            aspect-ratio: 16/8;
            border-radius: 1rem;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 500;
            font-size: 1rem;
        }
        .dark .project-hero { opacity: 0.85; }

        /* ── Project Meta Card ── */
        .meta-section {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 0.75rem;
            padding: 1.25rem 1.5rem;
        }
        .meta-label {
            font-size: 0.75rem;
            font-weight: 500;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.05em;
            margin-bottom: 0.3rem;
        }
        .meta-value {
            font-size: 0.9rem;
            color: var(--text-primary);
        }
        .meta-tag {
            display: inline-block; padding: 2px 10px; border-radius: 999px;
            font-size: 0.7rem; font-weight: 400;
            background: var(--accent-soft);
            color: var(--accent);
        }
        .tech-pill {
            display: inline-block; padding: 3px 12px; border-radius: 999px;
            font-size: 0.75rem; font-weight: 500;
            background: var(--accent-soft);
            color: var(--accent);
            border: 1px solid var(--border);
        }

        /* ── Markdown Content ── */
        .markdown-content {
            line-height: 1.8;
            color: var(--text-primary);
            font-size: 0.95rem;
        }
        .markdown-content h1 {
            font-size: 1.6rem;
            font-weight: 600;
            margin-top: 2rem;
            margin-bottom: 1rem;
            padding-bottom: 0.5rem;
            border-bottom: 1px solid var(--border);
        }
        .markdown-content h2 {
            font-size: 1.25rem;
            font-weight: 600;
            margin-top: 1.75rem;
            margin-bottom: 0.75rem;
        }
        .markdown-content h3 {
            font-size: 1.05rem;
            font-weight: 500;
            margin-top: 1.5rem;
            margin-bottom: 0.5rem;
        }
        .markdown-content p {
            margin-bottom: 1rem;
            color: var(--text-secondary);
        }
        .markdown-content strong {
            color: var(--text-primary);
            font-weight: 500;
        }
        .markdown-content ul, .markdown-content ol {
            margin-bottom: 1rem;
            padding-left: 1.5rem;
            color: var(--text-secondary);
        }
        .markdown-content li {
            margin-bottom: 0.35rem;
        }
        .markdown-content code {
            background: var(--accent-soft);
            padding: 2px 6px;
            border-radius: 4px;
            font-size: 0.85em;
            color: var(--accent);
        }
        .markdown-content pre {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 0.75rem;
            padding: 1rem 1.25rem;
            overflow-x: auto;
            margin-bottom: 1.25rem;
        }
        .markdown-content pre code {
            background: none;
            padding: 0;
            color: var(--text-primary);
        }
        .markdown-content a {
            color: var(--accent);
            text-decoration: underline;
            text-underline-offset: 2px;
        }
        .markdown-content a:hover {
            opacity: 0.8;
        }
        .markdown-content blockquote {
            border-left: 3px solid var(--accent);
            padding-left: 1rem;
            margin: 1rem 0;
            color: var(--text-secondary);
            font-style: italic;
        }
        .markdown-content hr {
            border: none;
            border-top: 1px solid var(--border);
            margin: 2rem 0;
        }
        .markdown-content img {
            max-width: 100%;
            border-radius: 0.75rem;
            margin: 1.5rem 0;
        }

        .link-btn {
            display: inline-flex;
            align-items: center;
            gap: 0.4rem;
            padding: 0.5rem 1.25rem;
            border-radius: 999px;
            font-size: 0.8rem;
            font-weight: 500;
            border: 1px solid var(--border);
            color: var(--text-primary);
            transition: all 0.2s ease;
            text-decoration: none;
        }
        .link-btn:hover {
            border-color: var(--accent);
            color: var(--accent);
            background: var(--accent-soft);
        }
    </style>
</head>
<body class="antialiased">
    <div id="bg-grid"></div>
    <canvas id="particles-canvas"></canvas>

    <!-- Navigation -->
    <nav class="sticky top-0 z-50 border-b border-gray-100">
        <div class="max-w-5xl mx-auto px-6 h-16 flex items-center justify-between">
            <a href="index.html" class="text-lg font-semibold tracking-tight text-gray-900">Fred Fu</a>
            <div class="hidden md:flex items-center space-x-8">
                <a href="index.html#about" class="nav-link text-sm font-medium">About</a>
                <a href="projects.html" class="nav-link text-sm font-medium">Projects</a>
                <a href="blog.html" class="nav-link text-sm font-medium">Blog</a>
                <a href="contact.html" class="nav-link text-sm font-medium">Contact</a>
                <button id="theme-toggle" aria-label="Toggle dark mode">
                    <svg class="sun-icon w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.364 6.364l-.707-.707M6.343 6.343l-.707-.707m12.728 0l-.707.707M6.343 17.657l-.707.707M16 12a4 4 0 11-8 0 4 4 0 018 0z"/>
                    </svg>
                    <svg class="moon-icon w-5 h-5" fill="currentColor" viewBox="0 0 24 24">
                        <path d="M21.752 15.002A9.718 9.718 0 0118 15.75c-5.385 0-9.75-4.365-9.75-9.75 0-1.33.266-2.597.748-3.752A9.753 9.753 0 003 11.25C3 16.635 7.365 21 12.75 21a9.753 9.753 0 009.002-5.998z"/>
                    </svg>
                </button>
            </div>
            <div class="md:hidden flex items-center space-x-3">
                <button id="theme-toggle-mobile" aria-label="Toggle dark mode" class="text-gray-500">
                    <svg class="sun-icon w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.364 6.364l-.707-.707M6.343 6.343l-.707-.707m12.728 0l-.707.707M6.343 17.657l-.707.707M16 12a4 4 0 11-8 0 4 4 0 018 0z"/>
                    </svg>

                </button>
                <button class="text-gray-500">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16m-7 6h7" />
                    </svg>

        </div>
    </nav>

    <!-- Back Link -->
    <section class="max-w-5xl mx-auto px-6 pt-8 pb-0">

    <script>
        // ── Dark Mode Toggle ──
        function toggleDarkMode() {
            document.documentElement.classList.toggle("dark");
            localStorage.setItem("theme", document.documentElement.classList.contains("dark") ? "dark" : "light");
        }
        document.getElementById("theme-toggle").addEventListener("click", toggleDarkMode);
        document.getElementById("theme-toggle-mobile").addEventListener("click", toggleDarkMode);
        if (localStorage.getItem("theme") === "dark" ||
            (!localStorage.getItem("theme") && window.matchMedia("(prefers-color-scheme: dark)").matches)) {
            document.documentElement.classList.add("dark");
        }

        // ── Floating Particles ──
        const canvas = document.getElementById("particles-canvas");
        const ctx = canvas.getContext("2d");
        let particles = [];
        let mouse = { x: -1000, y: -1000 };
        function resizeCanvas() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
        resizeCanvas(); window.addEventListener("resize", resizeCanvas);
        class Particle {
            constructor() { this.reset(); }
            reset() {
                this.x = Math.random() * canvas.width; this.y = Math.random() * canvas.height;
                this.size = Math.random() * 2.5 + 1; this.speedX = (Math.random() - 0.5) * 0.3;
                this.speedY = (Math.random() - 0.5) * 0.3; this.opacity = Math.random() * 0.4 + 0.1;
                this.pulse = Math.random() * Math.PI * 2; this.pulseSpeed = Math.random() * 0.02 + 0.005;
            }
            update() {
                this.x += this.speedX; this.y += this.speedY; this.pulse += this.pulseSpeed;
                const dx = mouse.x - this.x; const dy = mouse.y - this.y; const dist = Math.sqrt(dx * dx + dy * dy);
                if (dist < 200) { const force = (200 - dist) / 200 * 0.02; this.x += dx * force; this.y += dy * force; }
                if (this.x < -20 || this.x > canvas.width + 20 || this.y < -20 || this.y > canvas.height + 20) this.reset();
            }
            draw() {
                const currentOpacity = this.opacity * (0.6 + 0.4 * Math.sin(this.pulse));
                ctx.beginPath(); ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                const isDark = document.documentElement.classList.contains("dark");
                ctx.fillStyle = isDark ? `rgba(147, 197, 253, ${currentOpacity * 0.6})` : `rgba(59, 130, 246, ${currentOpacity * 0.5})`;
                ctx.fill();
            }
        }
        const particleCount = Math.min(60, Math.floor(window.innerWidth * window.innerHeight / 15000));
        for (let i = 0; i < particleCount; i++) particles.push(new Particle());
        function animateParticles() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            particles.forEach(p => { p.update(); p.draw(); });
            for (let i = 0; i < particles.length; i++) {
                for (let j = i + 1; j < particles.length; j++) {
                    const dx = particles[i].x - particles[j].x; const dy = particles[i].y - particles[j].y;
                    const dist = Math.sqrt(dx * dx + dy * dy);
                    if (dist < 120) {
                        const opacity = (1 - dist / 120) * 0.15;
                        const isDark = document.documentElement.classList.contains("dark");
                        ctx.strokeStyle = isDark ? `rgba(147, 197, 253, ${opacity * 0.5})` : `rgba(59, 130, 246, ${opacity * 0.4})`;
                        ctx.lineWidth = 0.5; ctx.beginPath(); ctx.moveTo(particles[i].x, particles[i].y); ctx.lineTo(particles[j].x, particles[j].y); ctx.stroke();
                    }
                }
            }
            requestAnimationFrame(animateParticles);
        }
        animateParticles();
        document.addEventListener("mousemove", (e) => { mouse.x = e.clientX; mouse.y = e.clientY; });
        document.addEventListener("mouseleave", () => { mouse.x = -1000; mouse.y = -1000; });

        // ── Project Detail Loading ──
        document.addEventListener("DOMContentLoaded", async () => {
            const urlParams = new URLSearchParams(window.location.search);
            const projectId = urlParams.get("id");
            const contentDiv = document.getElementById("project-content");
            const sidebarDiv = document.getElementById("project-sidebar");

            if (!projectId) {
                contentDiv.innerHTML = '<p class="text-gray-500">未指定项目 ID。</p>';
                return;
            }

            try {
                const response = await fetch("./projects.json");
                const projects = await response.json();
                const project = projects.find(p => p.id === projectId);

                if (!project) {
                    contentDiv.innerHTML = '<p class="text-gray-500">未找到该项目。</p>';
                    return;
                }

                // Set page title
                document.getElementById("page-title").textContent = `${project.title} | Fred Fu`;
                document.title = `${project.title} | Fred Fu`;

                // ── Render Hero ──
                contentDiv.innerHTML = `
                    <div class="project-hero bg-gradient-to-br ${project.hero_color}">
                        <span class="${project.hero_label_color}">${project.hero_label}</span>
                    </div>
                `;

                // ── Render Sidebar ──
                const techPills = project.tech_stack.map(t => `<span class="tech-pill">${t}</span>`).join(" ");
                const tagPills = project.tags.map(t => `<span class="meta-tag">${t}</span>`).join(" ");

                sidebarDiv.innerHTML = `
                    <div class="meta-section">
                        <div class="meta-label">年份</div>
                        <div class="meta-value mb-4">${project.year}</div>

                        <div class="meta-label">角色</div>
                        <div class="meta-value mb-4">${project.role}</div>

                        <div class="meta-label">分类</div>
                        <div class="meta-value mb-4">${project.category}</div>

                        <div class="meta-label mb-2">标签</div>
                        <div class="meta-value mb-4 flex flex-wrap gap-1.5">${tagPills}</div>

                        <div class="meta-label mb-2">技术栈</div>
                        <div class="flex flex-wrap gap-1.5">${techPills}</div>
                    </div>
                    <div class="meta-section">
                        <div class="meta-label mb-3">链接</div>
                        ${project.links.github ? `<a href="${project.links.github}" target="_blank" class="link-btn w-full mb-2"><svg class="w-4 h-4" fill="currentColor" viewBox="0 0 24 24"><path d="M12 0c-6.626 0-12 5.373-12 12 0 5.302 3.438 9.8 8.207 11.387.599.111.793-.261.793-.577v-2.234c-3.338.726-4.033-1.416-4.033-1.416-.546-1.387-1.333-1.756-1.333-1.756-1.089-.745.083-.729.083-.729 1.205.084 1.839 1.237 1.839 1.237 1.07 1.834 2.807 1.304 3.492.997.107-.775.418-1.305.762-1.604-2.665-.305-5.467-1.334-5.467-5.931 0-1.311.469-2.381 1.236-3.221-.124-.303-.535-1.524.117-3.176 0 0 1.008-.322 3.301 1.23.957-.266 1.983-.399 3.003-.404 1.02.005 2.047.138 3.006.404 2.291-1.552 3.297-1.23 3.297-1.23.653 1.653.242 2.874.118 3.176.77.84 1.235 1.911 1.235 3.221 0 4.609-2.807 5.624-5.479 5.921.43.372.823 1.102.823 2.222v3.293c0 .319.192.694.801.576 4.765-1.589 8.199-6.086 8.199-11.386 0-6.627-5.373-12-12-12z"/></svg>GitHub</a>` : ""}
                        ${project.links.live ? `<a href="${project.links.live}" target="_blank" class="link-btn w-full"><svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 6H6a2 2 0 00-2 2v10a2 2 0 002 2h10a2 2 0 002-2v-4M14 4h6m0 0v6m0-6L10 14"/></svg>在线演示</a>` : ""}
                    </div>
                `;

                // ── Render Markdown Content ──
                if (project.content_file) {
                    const contentResponse = await fetch(`./${project.content_file}`);
                    if (contentResponse.ok) {
                        const markdown = await contentResponse.text();
                        const html = marked.parse(markdown);
                        const contentContainer = document.createElement("div");
                        contentContainer.className = "markdown-content mt-8 bg-white p-6 md:p-8 rounded-2xl border border-gray-100";
                        contentContainer.style.backgroundColor = "var(--bg-card)";
                        contentContainer.style.borderColor = "var(--border)";
                        contentContainer.innerHTML = html;
                        contentDiv.appendChild(contentContainer);
                    } else {
                        contentDiv.innerHTML += `<p class="text-gray-500 mt-6">无法加载内容文件。</p>`;
                    }
                }
            } catch (error) {
                console.error("Error loading project detail:", error);
                contentDiv.innerHTML = '<p class="text-gray-500">加载项目详情时出错。</p>';
            }
        });
    </script>
</body>
